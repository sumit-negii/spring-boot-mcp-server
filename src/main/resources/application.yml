server:
  port: 8085

spring:
  application:
    name: spring-boot-mcp-server

  datasource:
    url: jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: true

  ai:
    mcp:
      server:
        name: task-management-mcp
        version: 1.0.0
        request-timeout: 30s
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp

  jackson:
    serialization:
      fail-on-empty-beans: false
